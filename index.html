<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figuritas — Cruce de Repetidas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #f0c040;
    --green: #3ecf7a;
    --text: #f0ede6;
    --muted: #888890;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; min-height: 100vh; }

  header { padding: 2.5rem 2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
  header span { color: var(--muted); font-size: 13px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

  .panel { padding: 1.5rem 1.75rem; border-right: 1px solid var(--border); }
  .panel:last-child { border-right: none; }

  .name-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; }
  .name-tag { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .name-input {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    padding: 0.2rem 0.3rem; outline: none; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); font-weight: 400; font-size: 13px; }

  .panel textarea {
    width: 100%; height: 260px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; line-height: 1.6; padding: 0.9rem 1rem; resize: vertical; outline: none; transition: border-color 0.2s;
  }
  .panel textarea:focus { border-color: var(--accent); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 0.4rem; }

  .actions { padding: 1.25rem 1.75rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  button { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.05em; padding: 0.55rem 1.3rem; border-radius: var(--radius); border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--muted); }
  .btn-dl { background: var(--surface2); color: var(--green); border: 1px solid var(--green); }
  .btn-dl:hover { background: var(--green); color: #111; }
  #status { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ── zona de resultados ── */
  #results { display: none; }
  #results.visible { display: block; }

  /* encabezado del resultado (NO se captura) */
  .results-topbar {
    padding: 1.25rem 1.75rem;
    display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .val-a { color: var(--accent); }
  .val-b { color: var(--green); }

  /* ── captura ── */
  #capture-zone {
    background: #0e0e10;
    padding: 1.5rem 1.75rem 1.75rem;
  }

  .capture-header {
    display: flex; align-items: baseline; gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #2e2e38;
  }
  .capture-header .ch-title {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #f0c040;
  }
  .capture-header .ch-sub { font-size: 12px; color: #888890; }

  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  @media (max-width: 700px) { .results-grid { grid-template-columns: 1fr; } }

  .exchange-block {
    background: #18181c;
    border: 1px solid #2e2e38;
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .block-title { margin-bottom: 0.75rem; }
  .block-title h2 {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.9rem;
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 3px;
  }
  .block-title p { font-size: 11px; color: var(--muted); }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-a { background: #f0c040; }
  .dot-b { background: #3ecf7a; }

  .country-rows { display: flex; flex-direction: column; gap: 5px; }
  .country-row {
    display: flex; align-items: flex-start; gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    background: #222228;
    border-radius: 7px;
  }
  .country-code { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; color: #f0c040; min-width: 38px; padding-top: 2px; flex-shrink: 0; }
  .country-code.green { color: #3ecf7a; }
  .stickers { color: #f0ede6; font-size: 11px; line-height: 1.55; word-break: break-word; font-family: 'DM Mono', monospace; }
  .empty-msg { color: var(--muted); font-size: 12px; padding: 0.6rem 0.75rem; background: #222228; border-radius: 7px; }

  .capture-footer {
    margin-top: 1.1rem;
    padding-top: 0.75rem;
    border-top: 1px solid #2e2e38;
    font-size: 10px;
    color: #444450;
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .dl-btn-wrap { padding: 0.75rem 1.75rem; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <h1>🗂 Figuritas</h1>
  <span>Cruce de repetidas · World Cup Stickers</span>
</header>

<div class="grid">
  <div class="panel">
    <div class="name-row">
      <span class="name-tag">Nombre A</span>
      <input class="name-input" id="nameA" type="text" placeholder="Ej: Pablo" maxlength="30" />
    </div>
    <textarea id="textA" placeholder="Lista de A — formato figuritas.app (I need / Swaps) o manual (Me faltan / Repetidas)"></textarea>
    <p class="hint">Soporta: figuritas.app · moovtech.app · formato manual</p>
  </div>
  <div class="panel">
    <div class="name-row">
      <span class="name-tag">Nombre B</span>
      <input class="name-input" id="nameB" type="text" placeholder="Ej: Hugo" maxlength="30" />
    </div>
    <textarea id="textB" placeholder="Lista de B — mismo formato"></textarea>
    <p class="hint">Puedes mezclar formatos.</p>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="cruzar()">⚡ Cruzar listas</button>
  <button class="btn-secondary" onclick="limpiar()">Limpiar todo</button>
  <span id="status"></span>
</div>

<div id="results">

  <!-- barra superior con totales y botón descarga — no entra en la captura -->
  <div class="results-topbar">
    <div class="stat">
      <span class="stat-val val-a" id="cnt-a">0</span>
      <span class="stat-label" id="label-a">A → B</span>
    </div>
    <div class="stat">
      <span class="stat-val val-b" id="cnt-b">0</span>
      <span class="stat-label" id="label-b">B → A</span>
    </div>
  </div>

  <!-- zona que se captura como imagen -->
  <div id="capture-zone">
    <div class="capture-header">
      <span class="ch-title" id="cap-title">Intercambio</span>
      <span class="ch-sub" id="cap-sub"></span>
    </div>

    <div class="results-grid">
      <div class="exchange-block">
        <div class="block-title">
          <h2><span class="dot dot-a"></span> <span id="title-a-to-b">A le da a B</span></h2>
          <p id="sub-a-to-b">Repetidas de A que le faltan a B</p>
        </div>
        <div class="country-rows" id="list-a-to-b"></div>
      </div>

      <div class="exchange-block">
        <div class="block-title">
          <h2><span class="dot dot-b"></span> <span id="title-b-to-a">B le da a A</span></h2>
          <p id="sub-b-to-a">Repetidas de B que le faltan a A</p>
        </div>
        <div class="country-rows" id="list-b-to-a"></div>
      </div>
    </div>

    <div class="capture-footer" id="cap-footer"></div>
  </div>

  <div class="dl-btn-wrap">
    <button class="btn-dl" onclick="descargarImagen()">⬇ Descargar imagen del intercambio</button>
  </div>

</div>

<script>
function getNombre(id) {
  const v = document.getElementById(id).value.trim();
  return v || (id === 'nameA' ? 'A' : 'B');
}

function parseList(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const need = {}, swaps = {};
  const rawLow = raw.toLowerCase();

  // Detect format — moovtech check first to avoid false positives
  const isMoovtech     = rawLow.includes('missing sticker') || rawLow.includes('duplicate sticker');
  const isFiguritasApp = !isMoovtech && (rawLow.includes('i need') || rawLow.includes('swaps'));
  const isManual       = rawLow.includes('me faltan') || rawLow.includes('repetidas');

  let section = null;

  for (const line of lines) {
    const lu = line.toLowerCase();

    // ── Section detection FIRST — before any skip logic ──
    if (isMoovtech) {
      if (lu.includes('missing sticker'))   { section = 'need';  continue; }
      if (lu.includes('duplicate sticker')) { section = 'swaps'; continue; }
    }
    if (isFiguritasApp) {
      if (lu === 'i need')  { section = 'need';  continue; }
      if (lu === 'swaps')   { section = 'swaps'; continue; }
    }
    if (isManual) {
      if (lu === 'me faltan')  { section = 'need';  continue; }
      if (lu === 'repetidas')  { section = 'swaps'; continue; }
    }

    if (!section) continue;

    // Skip non-data lines (only after section detection)
    if (lu.startsWith('http') || lu.startsWith('download the app')
        || lu.startsWith('figuritas') || lu.startsWith('usa mex')) continue;

    // ── Parse country line ──
    // Handles: "MEX: 1, 2, 3" · "MEX 🇲🇽: 1, 2, 3" · "MEX: 2(1x), 13(2x)"
    const match = line.match(/^([A-Z]{2,4})\s*[^:]*:\s*(.+)$/);
    if (!match) continue;

    const country = match[1].trim();
    const rawNums = match[2];

    // Extract numbers, ignoring quantity suffixes like (1x) (2x)
    const nums = [];
    const numRe = /(\d+)(?:\(\d+x\))?/g;
    let m;
    while ((m = numRe.exec(rawNums)) !== null) nums.push(m[1]);

    if (!nums.length) continue;
    const target = section === 'need' ? need : swaps;
    if (!target[country]) target[country] = [];
    target[country].push(...nums);
  }

  return { need, swaps };
}

function intersect(a, b) { const s = new Set(b); return a.filter(x => s.has(x)); }

function renderRows(containerId, data, accentClass) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  const countries = Object.keys(data).sort();
  if (!countries.length) {
    el.innerHTML = '<div class="empty-msg">— Sin cruces para este intercambio —</div>';
    return 0;
  }
  let total = 0;
  for (const c of countries) {
    if (!data[c] || !data[c].length) continue;
    total += data[c].length;
    const row = document.createElement('div');
    row.className = 'country-row';
    row.innerHTML = `<span class="country-code${accentClass ? ' ' + accentClass : ''}">${c}</span><span class="stickers">${data[c].join(', ')}</span>`;
    el.appendChild(row);
  }
  return total;
}

function cruzar() {
  const rawA = document.getElementById('textA').value;
  const rawB = document.getElementById('textB').value;
  const status = document.getElementById('status');

  if (!rawA.trim() || !rawB.trim()) { status.textContent = '⚠ Llena ambos cuadros.'; return; }
  status.textContent = 'Procesando…';

  try {
    const A = parseList(rawA);
    const B = parseList(rawB);
    const nA = getNombre('nameA'), nB = getNombre('nameB');

    const aToB = {};
    for (const c of Object.keys(A.swaps)) {
      const m = intersect(A.swaps[c] || [], B.need[c] || []);
      if (m.length) aToB[c] = m;
    }

    const bToA = {};
    for (const c of Object.keys(B.swaps)) {
      const m = intersect(B.swaps[c] || [], A.need[c] || []);
      if (m.length) bToA[c] = m;
    }

    const cntA = renderRows('list-a-to-b', aToB, '');
    const cntB = renderRows('list-b-to-a', bToA, 'green');

    document.getElementById('cnt-a').textContent = cntA;
    document.getElementById('cnt-b').textContent = cntB;
    document.getElementById('label-a').textContent = `${nA} → ${nB}`;
    document.getElementById('label-b').textContent = `${nB} → ${nA}`;

    document.getElementById('title-a-to-b').textContent = `${nA} le da a ${nB}`;
    document.getElementById('sub-a-to-b').textContent = `${cntA} figurita${cntA !== 1 ? 's' : ''} · repetidas de ${nA} que le faltan a ${nB}`;
    document.getElementById('title-b-to-a').textContent = `${nB} le da a ${nA}`;
    document.getElementById('sub-b-to-a').textContent = `${cntB} figurita${cntB !== 1 ? 's' : ''} · repetidas de ${nB} que le faltan a ${nA}`;

    document.getElementById('cap-title').textContent = `${nA} ↔ ${nB}`;
    document.getElementById('cap-sub').textContent = `${cntA + cntB} figuritas en total`;
    document.getElementById('cap-footer').textContent = `Generado con Figuritas Cruce · ${new Date().toLocaleDateString('es-MX')}`;

    document.getElementById('results').classList.add('visible');
    status.textContent = `✓ Listo — ${cntA + cntB} figuritas a intercambiar`;
  } catch(e) {
    status.textContent = '✗ Error al procesar. Revisa el formato.';
    console.error(e);
  }
}

async function descargarImagen() {
  const nA = getNombre('nameA'), nB = getNombre('nameB');
  const zone = document.getElementById('capture-zone');
  const status = document.getElementById('status');
  status.textContent = 'Generando imagen…';

  try {
    const canvas = await html2canvas(zone, {
      backgroundColor: '#0e0e10',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: zone.scrollWidth,
      windowHeight: zone.scrollHeight
    });
    const link = document.createElement('a');
    link.download = `figuritas_${nA}_${nB}.png`.replace(/\s+/g, '_');
    link.href = canvas.toDataURL('image/png');
    link.click();
    status.textContent = '✓ Imagen descargada';
  } catch(e) {
    status.textContent = '✗ Error al generar imagen.';
    console.error(e);
  }
}

function limpiar() {
  document.getElementById('textA').value = '';
  document.getElementById('textB').value = '';
  document.getElementById('nameA').value = '';
  document.getElementById('nameB').value = '';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('status').textContent = '';
}
</script>
</body>
</html>
